            --border: #eeeeee;
            --code-font: 'JetBrains Mono', monospace;

                --border: #30363d;
            }

            background-color: var(--bg);
            color: var(--text-main);

        .author-box {

            border: 1px solid var(--border);
        }

            border-radius: 4px;
            margin-left: 10px;
        }
