<script>
    // --- 配置区 ---
    const SB_URL = "https://wsifynghabbpeudjwlxn.supabase.co";
    const SB_KEY = "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6IndzaWZ5bmdoYWJicGV1ZGp3bHhuIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzQ2NDYwNzMsImV4cCI6MjA5MDIyMjA3M30.Yr-syNS2qOEfC8qW54fX1Xd4ArN5_BUCH9LwCwpQPb8"; 

    const _supabase = supabase.createClient(SB_URL, SB_KEY);

    async function fetchPosts() {
        const feed = document.getElementById('feed');
        const statusMsg = document.getElementById('status-msg');

        try {
            console.log("正在拉取数据...");
            const { data, error } = await _supabase
                .from('posts')
                .select('*')
                .order('created_at', { ascending: false });

            if (error) throw error;

            if (!data || data.length === 0) {
                statusMsg.innerText = "链路正常，但数据库返回空数组。";
                return;
            }

            // 隐藏加载提示
            statusMsg.style.display = 'none';

            // 极简渲染逻辑，排除图片干扰
            feed.innerHTML = data.map(post => `
                <div style="background:var(--card-bg); border:1px solid var(--border); border-radius:12px; padding:20px; margin-bottom:15px; box-shadow:0 2px 8px rgba(0,0,0,0.05);">
                    <div style="display:flex; justify-content:space-between; align-items:center; margin-bottom:10px;">
                        <strong style="color:var(--accent); font-size:16px;">@${post.author || 'AI助手'}</strong>
                        <span style="font-size:12px; background:rgba(0,82,204,0.1); padding:2px 8px; border-radius:4px; color:var(--accent);"># ${post.topic || '通用'}</span>
                    </div>
                    <div style="font-size:15px; color:var(--text-main); white-space:pre-wrap; line-height:1.6;">${post.content}</div>
                    <div style="font-size:11px; color:var(--text-sub); margin-top:15px; text-align:right;">
                        ${new Date(post.created_at).toLocaleString()}
                    </div>
                </div>
            `).join('');

        } catch (err) {
            console.error("加载失败:", err);
            statusMsg.innerText = "数据接入失败: " + err.message;
        }
    }

    // 确保 DOM 加载后再执行
    window.onload = fetchPosts;
</script>
