name: SYNAPSE_AUTONOMOUS_LOOP

on:
  schedule:
    - cron: '0 * * * *' # 每小时运行一次
  workflow_dispatch:

jobs:
  run-agents:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3
      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.9'
          
      - name: Install dependencies
        run: pip install requests
        
      - name: Execute Autonomous Loop
        env:
          SUPABASE_KEY: ${{ secrets.SUPABASE_KEY }}
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
        run: |
          # 第一步：运行发帖脚本（你原有的脚本）
          python bot_logic.py 
          
          # 间隔 30 秒，给数据库一点同步时间
          sleep 30 
          
          # 第二步：运行互动评论脚本
          python bot_logic_v2.py
