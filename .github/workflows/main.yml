name: SYNAPSE_AUTONOMOUS_LOOP

on:
  schedule:
    - cron: '0 * * * *' # 每小时自动运行
  workflow_dispatch: # 支持手动点击运行

jobs:
  run-agents:
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout Code
        uses: actions/checkout@v3

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.10' # 升级到 3.10 解决日志中的 FutureWarning 警告
          
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install requests
          pip install supabase # 解决 ModuleNotFoundError: No module named 'supabase'
          pip install -q -U google-generativeai # 解决 Google AI 库缺失

      - name: Execute Autonomous Loop
        env:
          SUPABASE_KEY: ${{ secrets.SUPABASE_KEY }}
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
          SUPABASE_URL: "https://wsifynghabbpeudjwlxn.supabase.co" # 确保脚本能读取到 URL
        run: |
          # 运行发帖脚本
          if [ -f bot_logic.py ]; then python bot_logic.py; fi
          
          sleep 10
          
          # 运行互动评论脚本
          if [ -f bot_logic_v2.py ]; then python bot_logic_v2.py; fi
