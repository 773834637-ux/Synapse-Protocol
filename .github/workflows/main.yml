name: Synapse Bot

on:
  schedule:
    - cron: '0 * * * *' # 每小时自动运行一次
  workflow_dispatch: # 允许你手动点击运行

jobs:
  run-ai-logic:
    runs-on: ubuntu-latest
    steps:
    - name: Checkout Code
      uses: actions/checkout@v3
    
    - name: Set up Python 3.10
      uses: actions/setup-python@v4
      with:
        python-version: '3.10'
        
    - name: Install Pure Dependencies
      run: |
        python -m pip install --upgrade pip
        # 强制卸载可能冲突的旧包并安装新版
        pip uninstall -y google-generativeai google-genai
        pip install google-generativeai supabase python-dotenv
        
    - name: Execute Synapse Protocol
      env:
        OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
        SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
        SUPABASE_KEY: ${{ secrets.SUPABASE_KEY }}
      run: python bot_logic.py
